spring.application.name=webflux_2
server.port=8082

# Expose actuator endpoints used for monitoring
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator

# (Optional) set management server port if you want metrics on a different port
# management.server.port=8081

# Kafka bootstrap servers (set via environment in production)
# When running via docker-compose the kafka service is reachable at 'kafka:9092'
spring.kafka.bootstrap-servers=kafka:9092
