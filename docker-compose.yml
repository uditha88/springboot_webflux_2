version: "3.8"
# version: "3.3" # production version

services:
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "8080:8080"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #   depends_on:
  #     - webflux_2
  #   networks:
  #     - monitoring-net

  webflux_2:
    image: uditha/spring_webflux_2:latest
    ports:
      - "8082:8082" # Makes http://127.0.0.1:8082 available in local. No Nginx used
      # since this MS to be used as an internal one, use the above just to test the functionalities.
      # else remove the above expose as well
    environment:
      - SERVER_PORT=8082
    # - "443:8081" # production port number
    networks:
      - monitoring-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - monitoring-net

  kafka:
    image: confluentinc/cp-kafka:7.4.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - monitoring-net

  # prometheus:
  #   image: prom/prometheus:latest
  #   volumes:
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #   ports:
  #     - "9090:9090"
  #   networks:
  #     - monitoring-net

  # grafana:
  #   image: grafana/grafana:latest
  #   environment:
  #     - GF_SECURITY_ADMIN_PASSWORD=admin
  #   ports:
  #     - "3000:3000"
  #   networks:
  #     - monitoring-net
  #   depends_on:
  #     - prometheus

networks:
  monitoring-net:
    driver: bridge
